name: Matrix Load

on:
  workflow_call:
    inputs:
      name:
        type: string
        description: "The name of the workflow used for the concurrency group."
        required: true
      matrix_path:
        type: string
        description: "The path of the test matrix definition."
        default: ""
      matrix_url:
        type: string
        description: "The url of the test matrix definition."
        default: ""

jobs:
  load-matrix:
    name: Prepare matrices
    runs-on: ubuntu-latest
    outputs:
      swift-matrix: ${{ steps.load-matrix.outputs.swift-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Mark the workspace as safe
        # https://github.com/actions/checkout/issues/766
        run: git config --global --add safe.directory ${GITHUB_WORKSPACE}
      - id: load-matrix
        run: |
            if [[ -n "${{ inputs.matrix_path }}" ]]; then
              printf "swift-matrix=%s" "$(jq -ec '.' ${{ inputs.matrix_path }})" >> "$GITHUB_OUTPUT"
            elif [[ -n "${{ inputs.matrix_url }}" ]]; then
              printf "swift-matrix=%s" "$(curl -s ${{ inputs.matrix_url }} | jq -ec '.')" >> "$GITHUB_OUTPUT"
            else
              echo "Exactly one of matrix_path, matrix_url must be defined."
              exit 1
            fi


  execute-matrix:
    name: Execute matrix
    needs: load-matrix
    # Workaround https://github.com/nektos/act/issues/1875
    uses: apple/swift-nio/.github/workflows/swift_test_matrix.yml@static_sdk_workflow  # TODO: change to @main
    with:
      name: ${{ inputs.name }}
      matrix_string: '${{ needs.load-matrix.outputs.swift-matrix }}'
