name: WebAssembly SDK

on:
  workflow_call:

jobs:
  wasm-sdk:
    name: WebAssembly SDK
    # Workaround https://github.com/nektos/act/issues/1875
    uses: apple/swift-nio/.github/workflows/swift_test_matrix.yml@main
    with:
      name: "WebAssembly SDK"
      matrix_string: >-
        {
          "config":[
            {
              "name":"latest-release",
              "swift_version":"latest-release",
              "platform":"Linux",
              "runner":"ubuntu-latest",
              "image":"ubuntu:jammy",
              "setup_command":"apt-get update -y -q && apt-get install -y -q curl && $workspace/scripts/install_wasm_sdk.sh",
              "command":"swift build",
              "command_arguments":"--swift-sdk wasm32-unknown-wasi"
            },
            {
              "name":"main Jammy",
              "swift_version":"main",
              "platform":"Linux",
              "runner":"ubuntu-latest",
              "image":"ubuntu:jammy",
              "setup_command":"apt-get update -y -q && apt-get install -y -q curl && $workspace/scripts/install_wasm_sdk.sh",
              "command":"swift build",
              "command_arguments":"--swift-sdk wasm32-unknown-wasi"
            }
          ]
        }
